let movimientos = [];

async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name + ' — extrayendo texto...';

  if (file.type === 'application/pdf') {
    try {
      const pdfjsLib = await loadPdfJs();
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(s => s.str).join(' ') + '\n';
      }
      document.getElementById('raw-text').value = fullText.trim();
      document.getElementById('file-name').textContent = file.name + ' — texto extraído';
    } catch(e) {
      document.getElementById('file-name').textContent = file.name + ' — error al leer PDF, pegá el texto manualmente';
      console.error(e);
    }
  } else if (file.type.startsWith('image/')) {
    // Para imágenes: convertir a base64 y poner referencia en texto
    const reader = new FileReader();
    reader.onload = (e) => {
      const b64 = e.target.result.split(',')[1];
      document.getElementById('raw-text').value = `[IMAGEN:${file.type}:${b64}]`;
      document.getElementById('file-name').textContent = file.name + ' — imagen lista';
    };
    reader.readAsDataURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('raw-text').value = e.target.result;
      document.getElementById('file-name').textContent = file.name;
    };
    reader.readAsText(file);
  }
}

function loadPdfJs() {
  return new Promise((resolve, reject) => {
    if (window.pdfjsLib) { resolve(window.pdfjsLib); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(window.pdfjsLib);
    };
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function parsear() {
  const texto = document.getElementById('raw-text').value.trim();
  const ctx = document.getElementById('ctx-input').value.trim();
  if (!texto) { alert('Pegá el texto o subí un archivo'); return; }

  document.getElementById('step-input').style.display = 'none';
  document.getElementById('step-review').style.display = '';
  setStatus('loading', 'Analizando movimientos...');

  try {
    const resp = await fetch('https://n8n.groumachine.com.ar/webhook/mosca-parseo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto, contexto: ctx })
    });
    const rawText = await resp.text();
    showDebug(rawText);

    let data;
    try { data = JSON.parse(rawText); } catch(e) {
      setStatus('error', 'n8n devolvió una respuesta que no es JSON — revisá el debug abajo.');
      return;
    }

    // Buscar movimientos en distintas estructuras posibles que puede devolver n8n
    let movs = null;
    if (data?.data?.movimientos) movs = data.data.movimientos;
    else if (data?.movimientos) movs = data.movimientos;
    else if (Array.isArray(data)) {
      // n8n a veces devuelve array de items
      const first = data[0];
      if (first?.data?.movimientos) movs = first.data.movimientos;
      else if (first?.movimientos) movs = first.movimientos;
      else if (first?.json?.data?.movimientos) movs = first.json.data.movimientos;
      else if (first?.json?.movimientos) movs = first.json.movimientos;
    }

    if (!movs || movs.length === 0) {
      setStatus('error', 'No se encontraron movimientos en la respuesta — revisá el panel debug abajo.');
      return;
    }

    movimientos = movs;
    movimientos.forEach((m, i) => {
      m._idx = i;
      m._incluir = true;
      m._editando = false;
      if (!m.resultado_id) m.resultado_id = getMesResultado(m.fecha);
    });
    renderMovimientos();
    setStatus(null);
  } catch(e) {
    setStatus('error', `Error de red: ${e.message}`);
    console.error(e);
  }
}

    document.getElementById('step-review').appendChild(el);
  }
  const preview = raw.length > 2000 ? raw.slice(0, 2000) + '\n... (truncado)' : raw;
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);">

      <button onclick="document.getElementById('debug-panel').style.display='none'" style="font-size:11px;border:none;background:none;cursor:pointer;color:var(--color-text-tertiary);">cerrar</button>

  `;
}

  }

  list.innerHTML = movimientos.map(m => {
    const isGasto = m.tipo === 'Gasto';
    const montoFmt = `$${Math.round(m.monto).toLocaleString('es-AR')}`;

        ${isGasto ? `
        <div><label>Categoría</label><select onchange="update(${m._idx},'categoria',this.value)">${['Materiales','Mano de Obra','Alquiler','Servicios','Marketing','Herramientas y Equipos','Reintegro','Otros'].map(c=>`<option ${m.categoria===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>Tipo gasto</label><select onchange="update(${m._idx},'tipo_gasto',this.value)">${['Fijo','Variable','Por unica vez'].map(t=>`<option ${m.tipo_gasto===t?'selected':''}>${t}</option>`).join('')}</select></div>
        ` : `
        <div><label>Tipo flujo</label><select onchange="update(${m._idx},'tipo_flujo',this.value)"><option ${m.tipo_flujo==='Operativo'?'selected':''}>Operativo</option><option ${m.tipo_flujo==='Capital'?'selected':''}>Capital</option></select></div>
        <div></div>
        `}
        <div class="mov-edit-full"><label>Proveedor / cliente</label><input value="${m.proveedor_nombre||''}" onchange="buscarProveedor(${m._idx},this.value)" list="prov-list-${m._idx}"><datalist id="prov-list-${m._idx}">${PROVEEDORES.map(p=>`<option value="${p.nombre}">`).join('')}</datalist></div>
        <div class="mov-edit-full"><label>Nota</label><input value="${m.nota||''}" onchange="update(${m._idx},'nota',this.value)"></div>
      </div>` : '';

    return `<div class="mov-row ${m._incluir?'':'excluded'}" id="row-${m._idx}">
      <div class="mov-row-header">
        <input type="checkbox" class="mov-check" ${m._incluir?'checked':''} onchange="toggleRow(${m._idx},this.checked)">
        <div class="mov-main">
          <div class="mov-top">
            <span class="mov-concepto">${m.concepto}</span>
            <span class="mov-monto ${isGasto?'monto-gasto':'monto-ingreso'}">${isGasto?'-':'+'} ${montoFmt}</span>
          </div>
          <div class="mov-meta">
            <span class="pill ${isGasto?'pill-gasto':'pill-ingreso'}">${m.tipo}</span>
            ${isGasto ? `<span class="pill pill-cat">${m.categoria||'—'}</span><span class="pill pill-cat">${m.tipo_gasto||'—'}</span>` : `<span class="pill pill-cat">${m.tipo_flujo||'—'}</span>`}
            ${m.sin_match ? `<span class="pill pill-warn">sin match</span>` : ''}
            ${m.posible_duplicado ? `<span class="pill pill-warn">posible dup</span>` : ''}
            <span class="mov-proveedor">${m.proveedor_nombre||''}</span>
            <span class="mov-fecha">${m.fecha||''}</span>
          </div>
        </div>
        <button class="edit-toggle" onclick="toggleEdit(${m._idx})">${m._editando?'cerrar':'editar'}</button>
      </div>
      ${editHTML}
    </div>`;
  }).join('');

  actualizarResumen();
}

function update(idx, field, val) { movimientos[idx][field] = val; renderMovimientos(); }

function buscarProveedor(idx, nombre) {
  const match = PROVEEDORES.find(p => p.nombre.toLowerCase() === nombre.toLowerCase());
  movimientos[idx].proveedor_nombre = nombre;
  movimientos[idx].proveedor_id = match ? match.id : null;
  movimientos[idx].sin_match = !match;
}

function toggleEdit(idx) { movimientos[idx]._editando = !movimientos[idx]._editando; renderMovimientos(); }
function toggleRow(idx, val) { movimientos[idx]._incluir = val; renderMovimientos(); }
function toggleAll(val) { movimientos.forEach(m => m._incluir = val); renderMovimientos(); }

function actualizarResumen() {
  const sel = movimientos.filter(m => m._incluir);
  const gastos = sel.filter(m => m.tipo === 'Gasto').reduce((a,m) => a + m.monto, 0);
  const ingresos = sel.filter(m => m.tipo === 'Ingreso').reduce((a,m) => a + m.monto, 0);
  document.getElementById('summary-bar').innerHTML = `
    <span>Seleccionados: <strong>${sel.length}</strong> / ${movimientos.length}</span>
    <span>Gastos: <strong>$${Math.round(gastos).toLocaleString('es-AR')}</strong></span>
    <span>Ingresos: <strong>$${Math.round(ingresos).toLocaleString('es-AR')}</strong></span>
  `;
  document.getElementById('sel-count').textContent = `${sel.length} movimiento(s) se guardarán`;
}

function getMesResultado(fecha) {
  const d = new Date(fecha + 'T12:00:00');
  const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  return RESULTADOS_MAP[k] || null;
}

async function confirmar() {
  const aConfirmar = movimientos.filter(m => m._incluir);
  if (!aConfirmar.length) { alert('No hay movimientos seleccionados'); return; }

  setStatus('loading', `Guardando ${aConfirmar.length} movimiento(s) en Airtable...`);

  const payload = aConfirmar.map(m => ({
    concepto: m.concepto,
    monto: m.monto,
    fecha: m.fecha,
    tipo: m.tipo,
    categoria: m.categoria || null,
    tipo_gasto: m.tipo_gasto || null,
    tipo_flujo: m.tipo_flujo || 'Operativo',
    proveedor_id: m.proveedor_id || null,
    resultado_id: m.resultado_id || getMesResultado(m.fecha),
    nota: m.nota || ''
  }));

  try {
    const resp = await fetch('https://n8n.groumachine.com.ar/webhook/mosca-guardar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ movimientos: payload })
    });
    const data = await resp.json();
    const ok = data.guardados ?? payload.length;
    const err = data.errores ?? 0;

    document.getElementById('step-review').style.display = 'none';
    document.getElementById('step-done').style.display = '';
    document.getElementById('done-msg').innerHTML = `
      <div class="status-bar ${err===0?'status-ok':'status-error'}">
        ${ok} guardado(s) correctamente${err>0 ? ` · ${err} con error` : ''}
      </div>
    `;
  } catch(e) {
    setStatus('error', 'Error al guardar. Revisá la conexión con n8n.');
    console.error(e);
  }
}

function setStatus(type, msg) {
  const el = document.getElementById('status-msg');
  if (!type) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="status-bar status-${type==='loading'?'loading':type}">${msg}</div>`;
}

function resetear() {
  movimientos = [];
  document.getElementById('raw-text').value = '';
  document.getElementById('ctx-input').value = '';
  document.getElementById('file-name').textContent = '';
  document.getElementById('file-input').value = '';
  document.getElementById('step-input').style.display = '';
  document.getElementById('step-review').style.display = 'none';
  document.getElementById('step-done').style.display = 'none';
  setStatus(null);
}
</script>
</body>
</html>
